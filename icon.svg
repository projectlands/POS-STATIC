<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with premium gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Outer Rounded Container -->
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  
  <!-- POS Symbol Group -->
  <g transform="translate(106, 106)" filter="url(#shadow)">
    <!-- Cash Register SVG Paths -->
    <path d="M260 210H40c-11 0-20 9-20 20v50c0 11 9 20 20 20h220c11 0 20-9 20-20v-50c0-11-9-20-20-20zm-20 60H60v-20h180v20z" fill="#ffffff" />
    <path d="M220 50H80c-11 0-20 9-20 20v120h180V70c0-11-9-20-20-20zm-20 90H100V80h100v60z" fill="#ffffff" opacity="0.9" />
    <circle cx="100" cy="110" r="10" fill="#3b82f6" />
    <circle cx="150" cy="110" r="10" fill="#8b5cf6" />
    <circle cx="200" cy="110" r="10" fill="#10b981" />
    <!-- Drawer details -->
    <path d="M30 290h240v20H30z" fill="#f3f4f6" />
    <!-- Keypad/Scanner Ray lines -->
    <path d="M120 240h20v10h-20zm30 0h20v10h-20zm30 0h20v10h-20z" fill="#d1d5db" />
  </g>
</svg>
